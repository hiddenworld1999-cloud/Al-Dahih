<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - منصة الدحيح</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        /* --- المتغيرات والتنسيقات الأساسية --- */
        :root { 
            --primary-blue: #0A2647; 
            --accent-orange: #FFC800; 
            --bg-light: #f0f4f8; 
            --text-dark: #1a1a1a; 
            --text-grey: #6c757d; 
            --error-color: #d32f2f;
            --success-color: #2e7d32;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-dark); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            position: relative;
            overflow: hidden; /* لمنع السكرول بسبب أشكال الخلفية */
        }

        /* --- أشكال الديكور في الخلفية (لمسة احترافية) --- */
        .bg-shape { position: absolute; border-radius: 50%; filter: blur(60px); z-index: -1; opacity: 0.7; }
        .shape-1 { top: -10%; right: -10%; width: 350px; height: 350px; background: rgba(10, 38, 71, 0.15); animation: float 6s ease-in-out infinite; }
        .shape-2 { bottom: -10%; left: -10%; width: 300px; height: 300px; background: rgba(255, 200, 0, 0.2); animation: float 8s ease-in-out infinite reverse; }

        @keyframes float { 
            0% { transform: translateY(0px) rotate(0deg); } 
            50% { transform: translateY(20px) rotate(5deg); } 
            100% { transform: translateY(0px) rotate(0deg); } 
        }

        /* --- صندوق تسجيل الدخول --- */
        .login-container { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 45px 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.08), 0 2px 15px rgba(0,0,0,0.03); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.8);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- اللوجو والنصوص --- */
        .login-logo { font-size: 2.2rem; font-weight: 900; color: var(--primary-blue); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; letter-spacing: -0.5px; }
        .logo-icon { font-size: 42px !important; margin-left: 10px; color: var(--accent-orange); animation: bounce 2s infinite; }
        
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }

        .login-title { font-size: 1.4rem; color: var(--text-dark); margin-bottom: 10px; font-weight: 700; }
        .login-subtitle { color: var(--text-grey); font-size: 0.95rem; margin-bottom: 35px; line-height: 1.6; padding: 0 10px; }
        
        /* --- حقل الإدخال --- */
        .input-group { margin-bottom: 25px; position: relative; text-align: right; }
        .input-label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: var(--primary-blue); padding-right: 5px; }
        
        .login-input { 
            width: 100%; 
            padding: 16px 45px 16px 15px; 
            border: 2px solid #e1e4e8; 
            border-radius: 16px; 
            font-family: inherit; 
            font-size: 1.15rem; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            background: #f8fafc; 
            color: var(--primary-blue); 
            font-weight: 700; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        .login-input::placeholder { color: #adb5bd; font-weight: 500; letter-spacing: 0; font-size: 0.95rem; }
        .login-input:focus { 
            border-color: var(--primary-blue); 
            background: white; 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(10, 38, 71, 0.1); 
        }
        .input-icon { position: absolute; right: 15px; top: 43px; color: var(--text-grey); font-size: 24px; transition: color 0.3s; }
        .login-input:focus + .input-icon { color: var(--primary-blue); }
        
        /* --- زر الدخول --- */
        .login-btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 16px; 
            background: var(--primary-blue); 
            color: white; 
            font-size: 1.15rem; 
            font-weight: 700; 
            font-family: inherit; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 8px 20px rgba(10, 38, 71, 0.25); 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .login-btn:hover { background: #071b33; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(10, 38, 71, 0.3); }
        .login-btn:active { transform: translateY(1px); box-shadow: 0 5px 10px rgba(10, 38, 71, 0.2); }
        .login-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* زرار الدوران أثناء التحميل */
        .spinner { animation: spin 1s linear infinite; font-size: 22px; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- الرسائل المنبثقة --- */
        .message-box { 
            padding: 14px 15px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            font-size: 0.95rem; 
            font-weight: 600;
            display: none; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .error-msg { background: #fef2f2; color: var(--error-color); border: 1px solid #fecaca; }
        .success-msg { background: #f0fdf4; color: var(--success-color); border: 1px solid #bbf7d0; }
        
        /* --- رابط الدعم الفني --- */
        .help-text { margin-top: 30px; font-size: 0.9rem; color: var(--text-grey); font-weight: 500; }
        .help-text a { 
            color: var(--primary-blue); 
            font-weight: 700; 
            text-decoration: none; 
            display: inline-flex; 
            align-items: center; 
            gap: 4px;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .help-text a:hover { background: rgba(10, 38, 71, 0.05); }

        /* هزة الخطأ */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
        .shake-animation { animation: shake 0.4s ease-in-out; border-color: var(--error-color) !important; }
    </style>

    <script>
        // كود حماية الصفحة
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || e.key === 'F12' || (e.ctrlKey && (e.key === 's' || e.key === 'c' || e.key === 'u' || e.key === 'i'))) {
                e.preventDefault();
            }
        });

        function validateLogin() {
            const codeInput = document.getElementById('accessCode');
            const userCode = codeInput.value.toUpperCase().trim();
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            const successText = document.getElementById('successText');
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            // 1. تنظيف واجهة الأخطاء القديمة
            errorBox.style.display = 'none'; 
            successBox.style.display = 'none';
            codeInput.classList.remove('shake-animation');
            
            // 2. تفعيل حالة التحميل (Loading State)
            btn.disabled = true;
            btnText.innerText = 'جاري التحقق...';
            btnSpinner.style.display = 'inline-block';

            // 3. محاكاة الاتصال بالسيرفر (تأخير ثانية لواقعية التصميم)
            setTimeout(() => {
                
                if (studentDatabase[userCode]) {
                    // --- حالة النجاح ---
                    const studentName = studentDatabase[userCode].split(' ')[0]; // جلب الاسم الأول فقط
                    
                    btnSpinner.style.display = 'none';
                    btnText.innerText = 'تم الدخول بنجاح ✓';
                    btn.style.background = 'var(--success-color)';
                    
                    successText.innerText = `أهلاً بك يا ${studentName}!`;
                    successBox.style.display = 'flex';
                    
                    // حفظ البيانات محلياً
                    localStorage.setItem('isLoggedInDaheeh', 'true');
                    localStorage.setItem('studentName', studentDatabase[userCode]); // حفظ الاسم كامل
                    localStorage.setItem('studentCode', userCode);

                    // الانتقال للصفحة الرئيسية بعد ثانية ونص
                    setTimeout(() => {
                        window.location.href = 'index.html'; 
                    }, 1500);

                } else {
                    // --- حالة الخطأ ---
                    btn.disabled = false;
                    btnSpinner.style.display = 'none';
                    btnText.innerText = 'تأكيد الدخول';
                    
                    errorBox.style.display = 'flex';
                    
                    // تشغيل حركة الهزة
                    codeInput.classList.add('shake-animation');
                    codeInput.value = ''; // تفريغ الخانة
                    codeInput.focus();
                }
            }, 1200); // 1.2 ثانية تأخير للشياكة
        }
    </script>
