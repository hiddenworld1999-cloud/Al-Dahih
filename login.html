<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - منصة الدحيح</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="الدحيح">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3048/3048122.png">

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <script>
        (function() {
            var isAndroidApp = navigator.userAgent.includes('wv') || window.location.href.includes('file://');
            var isIOSStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

            if (!isAndroidApp && !isIOSStandalone) {
                // بمسح محتوى الصفحة بالكامل وأحط رسالة حماية شيك جداً
                document.documentElement.innerHTML = `
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <title>تطبيق الدحيح - محمي</title>
                        <style>
                            body { background: #0A2647; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'IBM Plex Sans Arabic', sans-serif; text-align: center; padding: 20px; }
                            .box { background: rgba(255,255,255,0.05); padding: 40px 30px; border-radius: 24px; border: 1px solid rgba(255,200,0,0.3); max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
                            h2 { color: #FFC800; margin-bottom: 15px; font-weight: 900; font-size: 1.8rem;}
                            p { line-height: 1.8; color: #cbd5e1; font-size: 1.1rem;}
                            .btn-fake { display: inline-block; background: white; color: black; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin-top: 10px;}
                        </style>
                    </head>
                    <body>
                        <div class="box">
                            <div style="font-size: 70px; margin-bottom: 20px;">🛑</div>
                            <h2>النظام محمي</h2>
                            <p>عفواً، الدخول للمنصة متاح فقط من خلال التطبيق الرسمي للحفاظ على سرية المحتوى.</p>
                            
                            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                                <div style="font-size: 40px; margin-bottom:15px;">🍏</div>
                                <h3 style="color:#2196f3; margin-bottom: 10px;">لمستخدمي الآيفون (iOS):</h3>
                                <p style="font-size: 0.95rem;">اضغط على زر المشاركة <b>(Share)</b> بالأسفل ⬇️<br>ثم اختر<br><span class="btn-fake">إضافة إلى الصفحة الرئيسية ➕</span></p>
                            </div>
                        </div>
                    </body>
                `;
                // إيقاف أي أكواد تانية
                throw new Error("Access Denied: Opened in browser.");
            }
        })();
    </script>
    
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || e.key === 'F12' || (e.ctrlKey && (e.key === 's' || e.key === 'c' || e.key === 'u' || e.key === 'i'))) {
                e.preventDefault();
            }
        });
    </script>

    <style>
        /* --- تصميمك الأصلي --- */
        :root { 
            --primary-blue: #0A2647; 
            --accent-orange: #FFC800; 
            --bg-light: #f0f4f8; 
            --text-dark: #1a1a1a; 
            --text-grey: #6c757d; 
            --error-color: #d32f2f;
            --success-color: #2e7d32;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-dark); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            position: relative;
            overflow: hidden; 
        }

        .bg-shape { position: absolute; border-radius: 50%; filter: blur(60px); z-index: -1; opacity: 0.7; }
        .shape-1 { top: -10%; right: -10%; width: 350px; height: 350px; background: rgba(10, 38, 71, 0.15); animation: float 6s ease-in-out infinite; }
        .shape-2 { bottom: -10%; left: -10%; width: 300px; height: 300px; background: rgba(255, 200, 0, 0.2); animation: float 8s ease-in-out infinite reverse; }

        @keyframes float { 
            0% { transform: translateY(0px) rotate(0deg); } 
            50% { transform: translateY(20px) rotate(5deg); } 
            100% { transform: translateY(0px) rotate(0deg); } 
        }

        .login-container { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 45px 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.08), 0 2px 15px rgba(0,0,0,0.03); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.8);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .login-logo { font-size: 2.2rem; font-weight: 900; color: var(--primary-blue); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; letter-spacing: -0.5px; }
        .logo-icon { font-size: 42px !important; margin-left: 10px; color: var(--accent-orange); animation: bounce 2s infinite; }
        
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }

        .login-title { font-size: 1.4rem; color: var(--text-dark); margin-bottom: 10px; font-weight: 700; }
        .login-subtitle { color: var(--text-grey); font-size: 0.95rem; margin-bottom: 35px; line-height: 1.6; padding: 0 10px; }
        
        .input-group { margin-bottom: 25px; position: relative; text-align: right; }
        .input-label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: var(--primary-blue); padding-right: 5px; }
        
        .login-input { 
            width: 100%; 
            padding: 16px 45px 16px 15px; 
            border: 2px solid #e1e4e8; 
            border-radius: 16px; 
            font-family: inherit; 
            font-size: 1.15rem; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            background: #f8fafc; 
            color: var(--primary-blue); 
            font-weight: 700; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        .login-input::placeholder { color: #adb5bd; font-weight: 500; letter-spacing: 0; font-size: 0.95rem; }
        .login-input:focus { 
            border-color: var(--primary-blue); 
            background: white; 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(10, 38, 71, 0.1); 
        }
        .input-icon { position: absolute; right: 15px; top: 43px; color: var(--text-grey); font-size: 24px; transition: color 0.3s; }
        .login-input:focus + .input-icon { color: var(--primary-blue); }
        
        .login-btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 16px; 
            background: var(--primary-blue); 
            color: white; 
            font-size: 1.15rem; 
            font-weight: 700; 
            font-family: inherit; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 8px 20px rgba(10, 38, 71, 0.25); 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .login-btn:hover { background: #071b33; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(10, 38, 71, 0.3); }
        .login-btn:active { transform: translateY(1px); box-shadow: 0 5px 10px rgba(10, 38, 71, 0.2); }
        .login-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .spinner { animation: spin 1s linear infinite; font-size: 22px; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .message-box { 
            padding: 14px 15px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            font-size: 0.95rem; 
            font-weight: 600;
            display: none; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .error-msg { background: #fef2f2; color: var(--error-color); border: 1px solid #fecaca; }
        .success-msg { background: #f0fdf4; color: var(--success-color); border: 1px solid #bbf7d0; }
        
        .help-text { margin-top: 30px; font-size: 0.9rem; color: var(--text-grey); font-weight: 500; }
        .help-text a { 
            color: var(--primary-blue); 
            font-weight: 700; 
            text-decoration: none; 
            display: inline-flex; 
            align-items: center; 
            gap: 4px;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .help-text a:hover { background: rgba(10, 38, 71, 0.05); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
        .shake-animation { animation: shake 0.4s ease-in-out; border-color: var(--error-color) !important; }
    </style>

</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="login-container">
        <div class="login-logo">
            <span class="material-icons logo-icon">local_library</span>
            الدحيح
        </div>
        
        <h2 class="login-title">أهلاً بك يا بطل 🚀</h2>
        <p class="login-subtitle">يرجى إدخال كود التفعيل الخاص بك للوصول إلى المحتوى الدراسي.</p>

        <div id="errorBox" class="message-box error-msg">
            <span class="material-icons">error_outline</span>
            <span id="errorText">الكود المدخل غير صحيح.</span>
        </div>
        
        <div id="successBox" class="message-box success-msg">
            <span class="material-icons">check_circle</span>
            <span id="successText">تم التحقق بنجاح!</span>
        </div>

        <form id="loginForm" onsubmit="event.preventDefault(); validateLogin();">
            <div class="input-group">
                <label class="input-label" for="accessCode">كود التفعيل:</label>
                <input type="text" id="accessCode" class="login-input" placeholder="مثال: A1B2" required autocomplete="off" autocorrect="off" spellcheck="false">
                <span class="material-icons input-icon">vpn_key</span>
            </div>
            
            <button type="submit" class="login-btn" id="submitBtn">
                <span id="btnText">تأكيد الدخول</span>
                <span class="material-icons spinner" id="btnSpinner">autorenew</span>
            </button>
        </form>

        <p class="help-text">
            تواجه مشكلة أو لا تملك كود؟ <br>
            <a href="intent://resolve?domain=Hidden2003A#Intent;scheme=tg;package=org.telegram.messenger;S.browser_fallback_url=https%3A%2F%2Ft.me%2FHidden2003A;end">
                <span class="material-icons" style="font-size: 18px; color: #229ED9;">telegram</span>
                تواصل مع الدعم الفني
            </a>
        </p>
    </div>

    <script>
        if (localStorage.getItem('isLoggedInDaheeh') === 'true') {
            window.location.href = 'index.html';
        }

        // ⚠️ مهم: حط لينك السكريبت بتاعك هنا
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyukxDNMlKnRTCs42wNMmYyaYVZWJHXyxF4Qg_vRa2bWY7N1BNuS69BJxRmGoDOOyJKnw/exec";

        function validateLogin() {
            const codeInput = document.getElementById('accessCode');
            const userCode = codeInput.value.toUpperCase().trim();
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            const successText = document.getElementById('successText');
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            if(!userCode) return;
            
            errorBox.style.display = 'none'; 
            successBox.style.display = 'none';
            codeInput.classList.remove('shake-animation');
            
            btn.disabled = true;
            btnText.innerText = 'جاري التحقق...';
            btnSpinner.style.display = 'inline-block';

            fetch(`${SCRIPT_URL}?action=login&code=${userCode}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const studentName = data.name.split(' ')[0];
                        
                        btnSpinner.style.display = 'none';
                        btnText.innerText = 'تم الدخول بنجاح ✓';
                        btn.style.background = 'var(--success-color)';
                        
                        successText.innerText = `أهلاً بك يا ${studentName}!`;
                        successBox.style.display = 'flex';
                        
                        localStorage.setItem('isLoggedInDaheeh', 'true');
                        localStorage.setItem('studentName', data.name);
                        localStorage.setItem('studentCode', userCode);

                        setTimeout(() => {
                            window.location.href = 'index.html'; 
                        }, 1500);

                    } else {
                        btn.disabled = false;
                        btnSpinner.style.display = 'none';
                        btnText.innerText = 'تأكيد الدخول';
                        
                        errorBox.style.display = 'flex';
                        
                        codeInput.classList.add('shake-animation');
                        codeInput.value = '';
                        codeInput.focus();
                    }
                })
                .catch(error => {
                    btn.disabled = false;
                    btnSpinner.style.display = 'none';
                    btnText.innerText = 'تأكيد الدخول';
                    document.getElementById('errorText').innerText = 'حدث خطأ! تأكد من اتصالك بالإنترنت.';
                    errorBox.style.display = 'flex';
                });
        }
    </script>
</body>
</html>
