<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - الدحيح</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root { 
            --primary-blue: #0A2647; 
            --accent-orange: #FFC800; 
            --bg-main: #f4f7f6; 
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-grey: #64748b;
        }

        body.dark-mode {
            --primary-blue: #FFC800; 
            --accent-orange: #FFC800;
            --bg-main: #0f172a; 
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-grey: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.3s ease; }
        body { 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
            background: linear-gradient(135deg, #0A2647 0%, #144272 100%);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
        }

        /* دوائر الخلفية الفخمة */
        .circle-1 { position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,200,0,0.2) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; }
        .circle-2 { position: absolute; bottom: -100px; left: -50px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(33,150,243,0.2) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo-icon { font-size: 60px; color: var(--accent-orange); margin-bottom: 10px; text-shadow: 0 4px 15px rgba(255,200,0,0.4); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .title { font-size: 2rem; font-weight: 900; margin-bottom: 5px; letter-spacing: -0.5px; }
        .subtitle { font-size: 0.95rem; color: rgba(255,255,255,0.7); margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-icon { position: absolute; top: 50%; transform: translateY(-50%); right: 15px; color: rgba(255,255,255,0.6); font-size: 22px; }
        
        .code-input {
            width: 100%;
            padding: 18px 45px 18px 15px;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1.2rem;
            font-family: monospace;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: 0.3s;
        }
        .code-input:focus { border-color: var(--accent-orange); background: rgba(0,0,0,0.4); box-shadow: 0 0 15px rgba(255,200,0,0.2); }
        .code-input::placeholder { color: rgba(255,255,255,0.4); font-family: 'IBM Plex Sans Arabic', sans-serif; letter-spacing: normal; font-size: 1rem; }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: var(--accent-orange);
            color: #0A2647;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(255,200,0,0.3);
        }
        .submit-btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(255,200,0,0.2); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .spinner {
            display: none; width: 20px; height: 20px; border: 3px solid rgba(10,38,71,0.3);
            border-top-color: #0A2647; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* رسائل الخطأ والنجاح */
        .msg-box {
            display: none; align-items: center; justify-content: center; gap: 8px;
            padding: 12px; border-radius: 12px; margin-top: 15px; font-weight: 600; font-size: 0.95rem; animation: popIn 0.3s ease;
        }
        .msg-error { background: rgba(244, 67, 54, 0.2); border: 1px solid #f44336; color: #ffcdd2; }
        .msg-success { background: rgba(76, 175, 80, 0.2); border: 1px solid #4caf50; color: #c8e6c9; }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }

    </style>
</head>
<body>

    <div class="circle-1"></div>
    <div class="circle-2"></div>

    <div class="login-card">
        <span class="material-icons logo-icon">auto_awesome</span>
        <h1 class="title">تطبيق الدحيح</h1>
        <p class="subtitle">منصة التعليم الذكية، طريقك للنجاح</p>

        <div class="input-group">
            <span class="material-icons input-icon">vpn_key</span>
            <input type="text" id="accessCode" class="code-input" placeholder="أدخل كود التفعيل هنا..." autocomplete="off">
        </div>

        <button class="submit-btn" id="submitBtn" onclick="validateLogin()">
            <div class="spinner" id="btnSpinner"></div>
            <span id="btnText">دخول للمنصة</span>
        </button>

        <div id="errorBox" class="msg-box msg-error">
            <span class="material-icons" style="font-size:20px;">error_outline</span>
            <span id="errorText">الكود المدخل غير صحيح</span>
        </div>

        <div id="successBox" class="msg-box msg-success">
            <span class="material-icons" style="font-size:20px;">check_circle</span>
            <span id="successText">تم الدخول بنجاح!</span>
        </div>
    </div>

    <script>
        // توجيه تلقائي لو الطالب مسجل دخوله قبل كده
        if (localStorage.getItem('isLoggedInDaheeh') === 'true') {
            window.location.href = 'index.html';
        }

        // === الرابط السري بتاعك لجوجل شيت ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyukxDNMlKnRTCs42wNMmYyaYVZWJHXyxF4Qg_vRa2bWY7N1BNuS69BJxRmGoDOOyJKnw/exec";

        function validateLogin() {
            const codeInput = document.getElementById('accessCode');
            const userCode = codeInput.value.toUpperCase().trim();
            
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            if(!userCode) return; // منع الضغط لو الخانة فاضية

            // تصفير الحالات
            errorBox.style.display = 'none';
            successBox.style.display = 'none';
            codeInput.classList.remove('shake');

            // حالة التحميل
            btn.disabled = true;
            btnText.innerText = 'جاري التحقق...';
            btnSpinner.style.display = 'block';

            // الاتصال بقاعدة البيانات في جوجل شيت
            fetch(`${SCRIPT_URL}?code=${userCode}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // الكود صحيح
                        const firstName = data.name.split(' ')[0]; // استخراج الاسم الأول للترحيب

                        btnSpinner.style.display = 'none';
                        btnText.innerText = 'تـم!';
                        btn.style.background = '#4caf50'; // لون أخضر للنجاح
                        btn.style.color = 'white';

                        document.getElementById('successText').innerText = `أهلاً بك يا ${firstName}!`;
                        successBox.style.display = 'flex';

                        // حفظ بيانات الطالب في الموبايل
                        localStorage.setItem('isLoggedInDaheeh', 'true');
                        localStorage.setItem('studentName', data.name);
                        localStorage.setItem('studentCode', userCode);

                        // تحويل للصفحة الرئيسية بعد ثانية ونص
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);

                    } else {
                        // الكود خطأ
                        btn.disabled = false;
                        btnSpinner.style.display = 'none';
                        btnText.innerText = 'دخول للمنصة';

                        document.getElementById('errorText').innerText = 'الكود المدخل غير صحيح، تأكد منه.';
                        errorBox.style.display = 'flex';
                        
                        codeInput.classList.add('shake'); // هزة للإنذار
                        codeInput.value = '';
                        codeInput.focus();
                    }
                })
                .catch(error => {
                    // خطأ في الإنترنت
                    btn.disabled = false;
                    btnSpinner.style.display = 'none';
                    btnText.innerText = 'دخول للمنصة';

                    document.getElementById('errorText').innerText = 'حدث خطأ! تأكد من اتصالك بالإنترنت.';
                    errorBox.style.display = 'flex';
                });
        }

        // دعم الضغط على زرار Enter من الكيبورد
        document.getElementById('accessCode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validateLogin();
            }
        });
    </script>
</body>
</html>
